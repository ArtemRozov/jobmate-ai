spring:
  application:
    name: jobmate-ai

  datasource:
    url: jdbc:postgresql://localhost:5432/jobmate_ai_db
    username: postgres
    password: new_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

application:
  security:
    jwt:
      secret-key: "change-this-secret-key-change-this-secret-key-123456789"
      expiration: 86400000

server:
  port: 8080